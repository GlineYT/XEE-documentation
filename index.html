<h2 class="mx-auto">
    The below program will print "HELLO WORLD" to the terminal
</h2>

<div class="code mx-auto">
Example of a classic "HELLO WORLD" program

<program> <!-- Every program must be inside a <program> tag -->
    &lt;import id="!std"/&gt; <!-- println belongs to the standart library -->
    <call id="println"> <!--The call tag calls a function, the id specifies which -->
        <str>Hello world</str> <!--<str> tag, thus a string will be printed -->
    </call>

</program>
